name: Build and Release Firmware

on:
  release:
    types: [created, edited]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to upload artifacts to (e.g. v0.13.0)'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: pio run -e m5stack-cores3

      - name: Stage raw firmware
        run: mkdir -p bin/m5stack-cores3 && cp .pio/build/m5stack-cores3/firmware.bin bin/m5stack-cores3/firmware.bin

      - name: Upload firmware to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.event.release.tag_name }}
          files: |
            firmware/cardputer-chess-*.bin
            bin/m5stack-cores3/firmware.bin
